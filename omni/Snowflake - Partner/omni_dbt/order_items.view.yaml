# Reference this view as omni_dbt__order_items
label: Order Item
schema_label: ""
description: Order-level line items including product, pricing, and supply cost
  details for each item in an ecommerce order.

schema: omni_dbt
table_name: ORDER_ITEMS

dimensions:
  order_item_id:
    sql: '"ORDER_ITEM_ID"'
    format: ID
    description: Surrogate key for the individual line item within an order.
    primary_key: true
    ai_context: |-
      Each row in this view represents a single order item.
      Use order_item_id as the stable, unique identifier when counting distinct items, joining to downstream facts at the item grain, or debugging duplicate line items.

  order_id:
    sql: '"ORDER_ID"'
    format: ID
    description: Identifier of the parent order that groups multiple order items.
    ai_context: |-
      order_id links this view to the orders table where attributes like created_at, customer, and distribution center may live.
      Use this field when evaluating shipping SLA rules that operate at the order level, such as "created_at" and "time_to_ship" logic described in the Shipping SLA Notion document.

  product_id:
    sql: '"PRODUCT_ID"'
    format: ID
    description: Identifier of the product purchased on this line item.
    ai_context: |-
      product_id links each order item to product attributes such as brand, category, and premium-status flags referenced in the Notion policies.
      Use this when applying rules that differ by brand or product type (for example, premium brands that have stricter shipping delay or return handling).

  ordered_at:
    sql: '"ORDERED_AT"'
    description: Timestamp when the order containing this item was placed.
    ai_context: |-
      ordered_at is the order creation time used as the starting point for shipping SLA calculations in the Notion "Shipping SLA by Distribution Center" policy.
      Combine this with warehouse or distribution center attributes and time_to_ship to classify shipments as on-time, delayed, or severely delayed.

  product_name:
    sql: '"PRODUCT_NAME"'
    description: Human-readable name of the product at the time of purchase.
    ai_context: |-
      product_name is a descriptive label primarily for analytics and human-friendly reporting.
      Use this field when building dashboards or narratives about performance by product, premium brand, or product family as defined in Notion policies.

  product_price:
    sql: '"PRODUCT_PRICE"'
    description: Selling price charged to the customer for this item at the time of order.
    ai_context: |-
      product_price is the basis for revenue and refund calculations.
      Use this when measuring revenue impact of shipping delays or return policies (for example, when estimating lost revenue due to severe delays or applying brand-specific restocking rules).

  is_food_item:
    sql: '"IS_FOOD_ITEM"'
    description: Boolean flag indicating whether the product is classified as a food item.
    ai_context: |-
      is_food_item segments order items into food versus non-food categories.
      Use this flag when evaluating operational or return rules that may treat perishable goods differently, or when analyzing revenue performance for food products.

  is_drink_item:
    sql: '"IS_DRINK_ITEM"'
    description: Boolean flag indicating whether the product is classified as a drink item.
    ai_context: |-
      is_drink_item identifies beverage products.
      Use this when comparing performance of drink items to other categories or when applying any specialized policies for liquids (for example, different packaging, shipping constraints, or return eligibility).

  supply_cost:
    sql: '"SUPPLY_COST"'
    description: Aggregated supply-side cost associated with the product on this order item.
    ai_context: |-
      supply_cost represents the cost basis for the item, derived from supply records joined at the product_id level.
      Use this field together with product_price to compute gross margin and to understand how shipping or return policies impact profitability for specific brands or product categories.

measures:
  count:
    description: Number of order item rows.
    aggregate_type: count
    ai_context: |-
      This measure counts line items, not distinct orders.
      Use it to understand total item volume, or to normalize metrics like delayed shipments or returns per item.

  revenue:
    # Measure is defined in the 'order_item' dbt semantic model (models/marts/order_items.yml)
    sql: '"PRODUCT_PRICE"'
    description: Total revenue generated by summing product_price across order items.
    aggregate_type: sum
    ai_context: |-
      Revenue is calculated at the order item grain from the selling price charged to the customer.
      Use this measure when assessing financial impact of shipping SLA performance or brand-specific return rules from Notion, such as lost revenue due to severe delays or returns.

  food_revenue:
    # Measure is defined in the 'order_item' dbt semantic model (models/marts/order_items.yml)
    sql: CASE WHEN "IS_FOOD_ITEM" THEN "PRODUCT_PRICE" ELSE 0 END
    description: Revenue generated from items flagged as food products.
    aggregate_type: sum
    ai_context: |-
      This measure isolates revenue from food items only, based on is_food_item.
      Use it when analyzing how logistics, SLAs, or return policies affect perishable food revenue relative to other categories.

  drink_revenue:
    # Measure is defined in the 'order_item' dbt semantic model (models/marts/order_items.yml)
    sql: CASE WHEN "IS_DRINK_ITEM" THEN "PRODUCT_PRICE" ELSE 0 END
    description: Revenue generated from items flagged as drink products.
    aggregate_type: sum
    ai_context: |-
      This measure isolates revenue from drink items only, based on is_drink_item.
      Use it to compare beverage performance to other categories and to understand the effect of shipping speed or return handling on drink revenue.

  median_revenue:
    # Measure is defined in the 'order_item' dbt semantic model (models/marts/order_items.yml)
    sql: '"PRODUCT_PRICE"'
    description: Median revenue per order item, based on product_price.
    aggregate_type: median
    ai_context: |-
      Median revenue is less sensitive to extreme high- or low-priced items than average revenue.
      Use this measure when you want a robust central tendency of item-level pricing while still respecting the business rules and policies defined in the Notion documentation.

#The info below was pulled from your dbt repository and is read-only.
dbt:
  name: order_items
  target_schema: dbt_sleon_prod
  config:
    materialized: table
  code: |-
    with

    order_items as (

        select * from {{ ref('stg_order_items') }}

    ),


    orders as (

        select * from {{ ref('stg_orders') }}

    ),

    products as (

        select * from {{ ref('stg_products') }}

    ),

    supplies as (

        select * from {{ ref('stg_supplies') }}

    ),

    order_supplies_summary as (

        select
            product_id,

            sum(supply_cost) as supply_cost

        from supplies

        group by 1

    ),

    joined as (

        select
            order_items.*,

            orders.ordered_at,

            products.product_name,
            products.product_price,
            products.is_food_item,
            products.is_drink_item,

            order_supplies_summary.supply_cost

        from order_items

        left join orders on order_items.order_id = orders.order_id

        left join products on order_items.product_id = products.product_id

        left join order_supplies_summary
            on order_items.product_id = order_supplies_summary.product_id

    )

    select * from joined
  referenced_by: [ orders ]

ai_context: |-
  This view models one row per order line item for an ecommerce business.
  It is the core grain used when analyzing revenue, product mix, and operational policies such as shipping SLAs and brand return rules documented in Notion:
  - "Shipping SLA by Distribution Center"
  - "Brand Return Policy Restocking Rules"
  Use this view when you need to join orders, products, and supply-side costs to measure performance, classify delays, or evaluate the financial impact of returns and restocking decisions.
